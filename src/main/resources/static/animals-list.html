<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lista de Animais - Agro Management System</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos dos botões de ação baseados na imagem anexada */
        .btn-editar {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 8px;
            font-size: 0.9rem;
        }
        .btn-editar:hover { background-color: #357abd; }

        .btn-excluir {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .btn-excluir:hover { background-color: #d32f2f; }

        .text-center { text-align: center; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="brand">Agro Management</div>
    <ul class="nav-list">
        <li class="nav-item"><a href="dashboard.html"><span class="icon-dot"></span> Dashboard</a></li>
        <li class="nav-item active"><a href="animals-list.html"><span class="icon-dot"></span> Animais</a></li>
        <li class="nav-item"><a href="vacinas.html"><span class="icon-dot"></span> Vacinas</a></li>
        <li class="nav-item"><a href="vacinacao.html"><span class="icon-dot"></span> Vacinação</a></li>
        <li class="nav-item"><a href="historico.html"><span class="icon-dot"></span> Histórico</a></li>
        <li class="nav-item"><a href="relatorios.html"><span class="icon-dot"></span> Relatórios</a></li>
        <li class="nav-item" id="nav-usuarios"><a href="cadastro-usuario.html"><span class="icon-dot"></span> Usuários</a></li>
        <li class="nav-item" style="margin-top: auto;"><a href="#" onclick="logout()"><span class="icon-dot"></span> Sair</a></li>
    </ul>
</aside>

<main class="main-content">
    <header class="top-bar">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar por brinco, nome ou raça..." oninput="filtrarAnimais()">
        </div>
    </header>

    <section class="content-body">
        <div class="header-actions">
            <h1 class="page-title">Lista de Animais</h1>
            <a href="animal-form.html" class="btn-primary">+ Novo Animal</a>
        </div>

        <div class="table-container">
            <table class="custom-table">
                <thead>
                <tr>
                    <th>Brinco</th>
                    <th>Nome</th>
                    <th>Sexo</th>
                    <th>Raça</th>
                    <th>Peso</th>
                    <th>Data Nasc.</th>
                    <th class="text-center">Ações</th>
                </tr>
                </thead>
                <tbody id="animalsTableBody">
                <tr>
                    <td colspan="7" class="text-center">Carregando animais...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script>
    let todosAnimais = []; // Guarda a lista vinda do backend para busca local rápida
    const token = localStorage.getItem('token');

    document.addEventListener('DOMContentLoaded', () => {
        carregarAnimaisDoBackend();
    });

    async function carregarAnimaisDoBackend() {
        const tableBody = document.getElementById('animalsTableBody');

        try {
            const response = await fetch('/animals', {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });

            if (response.ok) {
                todosAnimais = await response.json();
                renderizarTabela(todosAnimais);
            } else if (response.status === 403 || response.status === 401) {
                tableBody.innerHTML = `<tr><td colspan="7" class="text-center" style="color: red;">⚠️ Sessão expirada. Faça login novamente.</td></tr>`;
            } else {
                tableBody.innerHTML = `<tr><td colspan="7" class="text-center" style="color: red;">Erro ao carregar a lista de animais.</td></tr>`;
            }
        } catch (error) {
            console.error('Erro de conexão:', error);
            tableBody.innerHTML = `<tr><td colspan="7" class="text-center" style="color: red;">Erro de conexão com o servidor.</td></tr>`;
        }
    }

    function renderizarTabela(lista) {
        const tableBody = document.getElementById('animalsTableBody');
        tableBody.innerHTML = '';

        if (lista.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="7" class="text-center">Nenhum animal encontrado.</td></tr>`;
            return;
        }

        lista.forEach(animal => {
            const row = document.createElement('tr');

            let dataNasc = '-';
            if (animal.bornIn) {
                const partes = animal.bornIn.split('-');
                if (partes.length === 3) dataNasc = `${partes[2]}/${partes[1]}/${partes[0]}`;
            }

            row.innerHTML = `
                <td><strong>#${animal.earring || 'S/N'}</strong></td>
                <td><strong>${animal.name || '-'}</strong></td>
                <td>${animal.sex || '-'}</td>
                <td>${animal.race || '-'}</td>
                <td>${animal.weight ? animal.weight + ' kg' : '-'}</td>
                <td>${dataNasc}</td>
                <td class="text-center">
                    <button class="btn-editar" onclick="acaoEditar(${animal.id})">Editar</button>
                    <button class="btn-excluir" onclick="acaoExcluir(${animal.id})">Excluir</button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    }

    function acaoEditar(id) {
        window.location.href = `animal-form.html?id=${id}`;
    }

    async function acaoExcluir(id) {
        const animal = todosAnimais.find(a => a.id === id);
        if (animal && confirm(`Tem certeza que deseja excluir o animal ${animal.name}?`)) {
            try {
                const response = await fetch(`/animals/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.ok || response.status === 204) {
                    alert('Animal excluído com sucesso!');
                    carregarAnimaisDoBackend(); // Recarrega a lista
                } else if (response.status === 409) {
                    alert('Aviso: Não é possível excluir este animal, pois ele já tomou vacinas (está no histórico).');
                } else {
                    alert('Erro ao tentar excluir o animal.');
                }
            } catch (error) {
                console.error('Erro:', error);
            }
        }
    }

    function filtrarAnimais() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtrados = todosAnimais.filter(a =>
            (a.name && a.name.toLowerCase().includes(query)) ||
            (a.earring && a.earring.toLowerCase().includes(query)) ||
            (a.race && a.race.toLowerCase().includes(query))
        );
        renderizarTabela(filtrados);
    }
</script>

</body>
</html>
