<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Vacinação - Agro Management System</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .vacina-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .btn-registrar-vacina { background-color: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .vacina-grid { display: flex; flex-direction: column; gap: 12px; }
        .vacina-row-header { display: grid; grid-template-columns: 1.2fr 1.5fr 1.2fr 1.2fr 1fr 1fr; padding: 16px 24px; color: #7f8c8d; font-size: 0.9rem; }
        .vacina-card { display: grid; grid-template-columns: 1.2fr 1.5fr 1.2fr 1.2fr 1fr 1fr; align-items: center; background-color: white; padding: 20px 24px; border-radius: 8px; border: 1px solid #eaedf1; font-weight: bold; }
        .btn-editar { background-color: #4a90e2; color: white; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; margin-right: 8px; }
        .btn-excluir { background-color: #f44336; color: white; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; }
        .secao-formulario { display: none; max-width: 600px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 8px; }
        .btn-salvar { background-color: #27ae60; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="brand">Agro Management</div>
    <ul class="nav-list">
        <li class="nav-item"><a href="dashboard.html"><span class="icon-dot"></span> Dashboard</a></li>
        <li class="nav-item"><a href="animals-list.html"><span class="icon-dot"></span> Animais</a></li>
        <li class="nav-item"><a href="vacinas.html"><span class="icon-dot"></span> Vacinas</a></li>
        <li class="nav-item active"><a href="vacinacao.html"><span class="icon-dot"></span> Vacinação</a></li>
        <li class="nav-item"><a href="historico.html"><span class="icon-dot"></span> Histórico</a></li>
        <li class="nav-item"><a href="#"><span class="icon-dot"></span> Relatórios</a></li>
        <li class="nav-item" id="nav-usuarios"><a href="cadastro-usuario.html"><span class="icon-dot"></span> Usuários</a></li>
        <li class="nav-item"><a href="#"><span class="icon-dot"></span> Configurações</a></li>
        <li class="nav-item" style="margin-top: auto;"><a href="#" onclick="logout()"><span class="icon-dot"></span> Sair</a></li>
    </ul>
</aside>

<main class="main-content">
    <section class="content-body">
        <!-- Formulário -->
        <div id="formularioVacinacao" class="secao-formulario">
            <h1 id="formTitle">Editar Registro</h1>
            <form onsubmit="salvarVacinacao(event)">
                <input type="hidden" id="vacinacaoId">
                
                <div class="form-group">
                    <label>ID do Animal</label>
                    <input type="number" id="animalId" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label>ID da Vacina</label>
                    <input type="number" id="vaccineId" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label>Data da Aplicação</label>
                    <input type="date" id="date" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label>Próxima Dose</label>
                    <input type="date" id="next" class="form-control">
                </div>
                
                <div class="form-group">
                    <label>Status (Observação)</label>
                    <select id="status" class="form-control">
                        <option value="Em Dia">Em Dia</option>
                        <option value="Pendente">Pendente</option>
                        <option value="Atrasada">Atrasada</option>
                    </select>
                </div>
                
                <button type="button" class="btn-cancelar" onclick="fecharFormulario()">Cancelar</button>
                <button type="submit" class="btn-salvar">Salvar Alterações</button>
            </form>
        </div>

        <!-- Listagem -->
        <div id="listagemVacinacao">
            <div class="vacina-header">
                <h1>Vacinação</h1>
                <button class="btn-registrar-vacina" onclick="abrirFormNovo()">+ Registrar Vacina</button>
            </div>
            <div class="vacina-grid">
                <div class="vacina-row-header">
                    <div>Animal</div><div>Vacina</div><div>Data</div><div>Próxima</div><div>Status</div><div>Ações</div>
                </div>
                <div id="vacinasContainer"></div>
            </div>
        </div>
    </section>
</main>

<script>
    let registrosAtuais = [];

    document.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('token');
        const userRole = localStorage.getItem('role');

        // 1. Redireciona para o login se não estiver autenticado
        if (!token) {
            window.location.href = 'index.html';
            return;
        }

        if (userRole !== 'GESTOR' && userRole !== 'ROLE_ADMIN') {
            alert('Acesso negado: Apenas gestores podem acessar esta página.');
            window.location.href = 'dashboard.html';
            return;
        }

        carregarTodasVacinacoes();
    });

    // 1. Função para carregar TODAS as vacinações da fazenda
    async function carregarTodasVacinacoes() {
        const token = localStorage.getItem('token');
        try {
            const response = await fetch('/sanitary-history', {
                method: 'GET',
                headers: { 
                    'Authorization': 'Bearer ' + token 
                } 
            });
            if (response.ok) {
                registrosAtuais = await response.json();
                renderizarCards(registrosAtuais);
            }
        } catch (error) {
            console.error("Erro ao buscar a lista completa de vacinações:", error);
        }
    }

    // 2. Função para carregar vacinações de um ANIMAL ESPECÍFICO
    async function carregarVacinacoesPorAnimal(animalId) {
        const token = localStorage.getItem('token');
        try {
            const response = await fetch(`/sanitary-history/animal/${animalId}`, {
                method: 'GET',
                headers: { 
                    'Authorization': 'Bearer ' + token 
                } 
            });
            if (response.ok) {
                const dados = await response.json();
                // Aqui você pode renderizar na tela ou retornar os dados
                renderizarCards(dados); 
            }
        } catch (error) {
            console.error(`Erro ao buscar vacinações do animal ${animalId}:`, error);
        }
    }

    async function salvarVacinacao(event) {
        event.preventDefault();
        
        const token = localStorage.getItem('token');
        const id = document.getElementById('vacinacaoId').value;
        
        // Extrai o ID do usuário logado decodificando o token JWT em tempo real
        let currentUserId = null;
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(window.atob(base64));
            
            currentUserId = payload.id || payload.userId || payload.sub; 
        } catch (err) {
            console.error('Não foi possível extrair o ID do usuário do token:', err);
        }

        // Monta o payload com os valores reais capturados da tela
        const dados = {
            animalId: parseInt(document.getElementById('animalId').value, 10),
            vaccineId: parseInt(document.getElementById('vaccineId').value, 10),
            userId: parseInt(currentUserId, 10),
            applicationDate: document.getElementById('date').value, // Formato YYYY-MM-DD
            nextDoseDate: document.getElementById('next').value || null,
            observation: document.getElementById('status').value
        };

        // Envia para o endpoint correto de histórico sanitário
        try {
            const response = await fetch(id ? `/sanitary-history/${id}` : '/sanitary-history', {
                method: id ? 'PUT' : 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': 'Bearer ' + token 
                },
                body: JSON.stringify(dados)
            });

            if (response.ok) {
                fecharFormulario();
                carregarTodasVacinacoes();
            } else {
                alert("Erro ao salvar o registro de vacinação. Verifique se os IDs informados existem.");
            }
        } catch (error) {
            console.error("Erro na comunicação com a API:", error);
            alert("Erro de conexão com o servidor.");
        }
    }

    async function excluirVacinacao(id) {
        if (confirm("Deseja realmente remover este registro?")) {
            const token = localStorage.getItem('token');
            // Correção da concatenação de URL e troca para sanitary-history
            await fetch(`/sanitary-history/${id}`, { 
                method: 'DELETE', 
                headers: { 
                    'Authorization': 'Bearer ' + token 
                } 
            });
            carregarTodasVacinacoes();
        }
    }

    function renderizarCards(lista) {
        const container = document.getElementById('vacinasContainer');
        container.innerHTML = '';
        lista.forEach(item => {
            container.innerHTML += `
                <div class="vacina-card">
                    <div>${item.animalName}</div>
                    <div>${item.vaccineName}</div>
                    <div>${item.applicationDate}</div>
                    <div>${item.nextDoseDate || '-'}</div>
                    <div>${item.observation}</div>
                    <div>
                        <button class="btn-editar" onclick="abrirFormEditar(${item.id})">Editar</button>
                        <button class="btn-excluir" onclick="excluirVacinacao(${item.id})">Excluir</button>
                    </div>
                </div>`;
        });
    }

    function abrirFormNovo() {
        document.getElementById('listagemVacinacao').style.display = 'none';
        document.getElementById('formularioVacinacao').style.display = 'block';
        document.getElementById('vacinacaoId').value = '';
    }

    function abrirFormEditar(id) {
        const registro = registrosAtuais.find(v => v.id === id);
        if (!registro) return;
        document.getElementById('listagemVacinacao').style.display = 'none';
        document.getElementById('formularioVacinacao').style.display = 'block';
        document.getElementById('vacinacaoId').value = registro.id;
        document.getElementById('animal').value = registro.animal;
        document.getElementById('vaccine').value = registro.vaccine;
        document.getElementById('date').value = registro.date;
        document.getElementById('next').value = registro.next;
        document.getElementById('status').value = registro.status;
    }

    function fecharFormulario() {
        document.getElementById('formularioVacinacao').style.display = 'none';
        document.getElementById('listagemVacinacao').style.display = 'block';
    }

</script>
</body>
</html>
