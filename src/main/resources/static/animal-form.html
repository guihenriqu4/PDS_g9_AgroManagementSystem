<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Animal - Agro Management System</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .form-container {
            max-width: 600px;
            background: transparent;
            padding: 20px 0;
        }
        .form-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #1a2a3a;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            font-size: 1rem;
            color: #2c3e50;
            box-sizing: border-box;
            background-color: white;
        }
        .form-control:focus {
            outline: none;
            border-color: #27ae60;
        }
        .btn-group {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 32px;
        }
        .btn-cancelar {
            background-color: white;
            color: #2c3e50;
            border: 1px solid #dcdde1;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .btn-cancelar:hover { background-color: #f8f9fa; }

        .btn-salvar {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .btn-salvar:hover { background-color: #219653; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="brand">Agro Management</div>
    <ul class="nav-list">
        <li class="nav-item"><a href="dashboard.html"><span class="icon-dot"></span> Dashboard</a></li>
        <li class="nav-item active"><a href="animals-list.html"><span class="icon-dot"></span> Animais</a></li>
        <li class="nav-item"><a href="vacinas.html"><span class="icon-dot"></span> Vacinas</a></li>
        <li class="nav-item"><a href="vacinacao.html"><span class="icon-dot"></span> Vacinação</a></li>
        <li class="nav-item"><a href="#"><span class="icon-dot"></span> Histórico</a></li>
        <li class="nav-item"><a href="#"><span class="icon-dot"></span> Relatórios</a></li>
        <li class="nav-item" id="nav-usuarios"><a href="cadastro-usuario.html"><span class="icon-dot"></span> Usuários</a></li>
        <li class="nav-item"><a href="#"><span class="icon-dot"></span> Configurações</a></li>
        <li class="nav-item" style="margin-top: auto;"><a href="#" onclick="logout()"><span class="icon-dot"></span> Sair</a></li>
    </ul>
</aside>

<main class="main-content">
    <section class="content-body">
        <div class="form-container">
            <h1 class="form-title" id="pageTitle">Editar Animal</h1>

            <form id="animalForm" onsubmit="salvarAnimal(event)">
                <div class="form-group">
                    <label>Brinco</label>
                    <input type="text" id="earring" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="name" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Sexo</label>
                    <select id="sex" class="form-control">
                        <option value="Macho">Macho</option>
                        <option value="Fêmea">Fêmea</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Raça</label>
                    <input type="text" id="race" class="form-control">
                </div>

                <div class="form-group">
                    <label>Peso (kg)</label>
                    <input type="number" step="0.1" id="weight" class="form-control">
                </div>

                <div class="btn-group">
                    <button type="button" class="btn-cancelar" onclick="window.location.href='animals-list.html'">Cancelar</button>
                    <button type="submit" class="btn-salvar">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </section>
</main>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const animalId = urlParams.get('id');
    const token = localStorage.getItem('token');

    document.addEventListener('DOMContentLoaded', () => {
        if (animalId) {
            carregarDadosDoAnimal();
        } else {
            document.getElementById('pageTitle').innerText = "Novo Animal";
        }
    });

    async function carregarDadosDoAnimal() {
        try {
            const response = await fetch(`/animals/${animalId}`, {
                method: 'GET',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (response.ok) {
                const animal = await response.json();
                document.getElementById('earring').value = animal.earring || '';
                document.getElementById('name').value = animal.name || '';
                document.getElementById('sex').value = animal.sex || 'Macho';
                document.getElementById('race').value = animal.race || '';
                document.getElementById('weight').value = animal.weight || '';
            }
        } catch (error) {
            console.error("Erro ao buscar dados do animal:", error);
        }
    }

    async function salvarAnimal(event) {
        event.preventDefault();

        const payload = {
            earring: document.getElementById('earring').value,
            name: document.getElementById('name').value,
            sex: document.getElementById('sex').value,
            race: document.getElementById('race').value,
            weight: parseFloat(document.getElementById('weight').value)
        };

        const url = animalId ? `/animals/${animalId}` : '/animals';
        const method = animalId ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                window.location.href = 'animals-list.html';
            } else {
                alert("Erro ao salvar as alterações do animal.");
            }
        } catch (error) {
            console.error("Erro na requisição:", error);
        }
    }
</script>
</body>
</html>
